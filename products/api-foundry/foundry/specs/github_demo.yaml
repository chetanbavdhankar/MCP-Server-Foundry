openapi: 3.0.3
info:
  title: GitHub API (Demo Slice)
  description: A curated subset of the GitHub REST API.
  version: "2022-11-28"
servers:
  - url: https://api.github.com
    description: GitHub Production API

security:
  - bearerAuth: []

paths:
  /repos/{owner}/{repo}/issues:
    post:
      summary: Create an issue
      description: Creates an issue in a repository.
      tags:
        - Issues
      parameters:
        - in: path
          name: owner
          required: true
          schema:
            type: string
        - in: path
          name: repo
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: The title of the issue.
                body:
                  type: string
                  description: The contents of the issue.
                assignees:
                  type: array
                  items:
                    type: string
              required:
                - title
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: GitHub Personal Access Token (classic or fine-grained).

  schemas:
    Issue:
      type: object
      properties:
        id:
          type: integer
        number:
          type: integer
        title:
          type: string
        state:
          type: string
          enum: [open, closed]
      required:
        - id
        - number
        - title
        - state

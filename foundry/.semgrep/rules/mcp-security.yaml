# Semgrep rules for MCP Server security
# These rules detect common security issues in generated MCP servers

rules:
  # ============================================================================
  # CRITICAL: Hardcoded Secrets
  # ============================================================================
  
  - id: hardcoded-api-key
    pattern-either:
      - pattern: api_key = "..."
      - pattern: apiKey = "..."
      - pattern: API_KEY = "..."
    message: |
      Hardcoded API key detected. API keys must be loaded from environment variables.
      Use: api_key = os.getenv("API_KEY")
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      
  - id: hardcoded-token
    pattern-either:
      - pattern: token = "..."
      - pattern: bearer_token = "..."
      - pattern: access_token = "..."
    message: |
      Hardcoded token detected. Tokens must be loaded from environment variables.
      Use: token = os.getenv("API_TOKEN")
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      
  - id: hardcoded-password
    pattern-either:
      - pattern: password = "..."
      - pattern: passwd = "..."
    message: |
      Hardcoded password detected. Passwords must be loaded from environment variables.
      Use: password = os.getenv("API_PASSWORD")
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
  
  # ============================================================================
  # CRITICAL: SQL Injection
  # ============================================================================
  
  - id: sql-injection-format-string
    pattern: |
      $CURSOR.execute(f"... {$VAR} ...")
    message: |
      Potential SQL injection via f-string. Use parameterized queries instead.
      Bad:  cursor.execute(f"SELECT * FROM users WHERE id = {user_id}")
      Good: cursor.execute("SELECT * FROM users WHERE id = ?", (user_id,))
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-89: SQL Injection"
      owasp: "A03:2021 - Injection"
      
  - id: sql-injection-string-concat
    pattern-either:
      - pattern: |
          $CURSOR.execute("..." + $VAR + "...")
      - pattern: |
          $CURSOR.execute("..." + $VAR)
    message: |
      Potential SQL injection via string concatenation. Use parameterized queries.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-89: SQL Injection"
  
  # ============================================================================
  # CRITICAL: Command Injection
  # ============================================================================
  
  - id: command-injection-os-system
    pattern: os.system($VAR)
    message: |
      Command injection risk with os.system(). Avoid using os.system() with user input.
      Use subprocess.run() with shell=False and a list of arguments instead.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-78: OS Command Injection"
      owasp: "A03:2021 - Injection"
      
  - id: command-injection-shell-true
    pattern: subprocess.$METHOD(..., shell=True, ...)
    message: |
      Using shell=True is dangerous with user input. Set shell=False and pass arguments as a list.
      Bad:  subprocess.run(f"ls {user_dir}", shell=True)
      Good: subprocess.run(["ls", user_dir], shell=False)
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-78: OS Command Injection"
  
  # ============================================================================
  # HIGH: Missing Input Validation
  # ============================================================================
  
  - id: missing-input-validation-http
    pattern: |
      def $FUNC(...):
        ...
        $HTTP.$METHOD($URL, ...)
    message: |
      HTTP request without apparent input validation. Ensure all user inputs
      are validated before making API calls.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-20: Improper Input Validation"
      
  - id: unvalidated-redirect
    pattern-either:
      - pattern: redirect($VAR)
      - pattern: Response.redirect($VAR)
    message: |
      Unvalidated redirect detected. Validate redirect URLs against a whitelist.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-601: URL Redirection to Untrusted Site"
  
  # ============================================================================
  # HIGH: Insecure Deserialization
  # ============================================================================
  
  - id: unsafe-pickle-load
    pattern: pickle.load($VAR)
    message: |
      Unsafe deserialization with pickle.load(). Never deserialize untrusted data.
      Use json.loads() for untrusted input instead.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-502: Deserialization of Untrusted Data"
      owasp: "A08:2021 - Software and Data Integrity Failures"
      
  - id: unsafe-yaml-load
    pattern: yaml.load($VAR)
    message: |
      Unsafe YAML deserialization. Use yaml.safe_load() instead of yaml.load().
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-502: Deserialization of Untrusted Data"
  
  # ============================================================================
  # MEDIUM: Information Disclosure
  # ============================================================================
  
  - id: exception-leaks-info
    pattern: |
      except $EXC as $VAR:
        ...
        return ... str($VAR) ...
    message: |
      Exception message returned to user may leak sensitive information.
      Return a generic error message instead and log the full exception server-side.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-209: Information Exposure Through an Error Message"
      
  - id: debug-mode-enabled
    pattern-either:
      - pattern: debug=True
      - pattern: DEBUG = True
    message: |
      Debug mode should not be enabled in production. Set debug=False.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-489: Active Debug Code"
  
  # ============================================================================
  # MEDIUM: Weak Cryptography
  # ============================================================================
  
  - id: weak-hash-md5
    pattern-either:
      - pattern: hashlib.md5(...)
      - pattern: md5(...)
    message: |
      MD5 is cryptographically broken. Use hashlib.sha256() or stronger.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      
  - id: weak-hash-sha1
    pattern-either:
      - pattern: hashlib.sha1(...)
      - pattern: sha1(...)
    message: |
      SHA1 is deprecated for security purposes. Use hashlib.sha256() or stronger.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
  
  # ============================================================================
  # MEDIUM: Path Traversal
  # ============================================================================
  
  - id: path-traversal-open
    pattern: open($VAR, ...)
    message: |
      Potential path traversal vulnerability. Validate and sanitize file paths
      before opening files. Use os.path.abspath() and check the path is within
      allowed directories.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-22: Path Traversal"
      owasp: "A01:2021 - Broken Access Control"
  
  # ============================================================================
  # LOW: Code Quality
  # ============================================================================
  
  - id: bare-except
    pattern: |
      try:
        ...
      except:
        ...
    message: |
      Bare except clause catches all exceptions including system exits.
      Catch specific exceptions instead: except ValueError, TypeError:
    severity: INFO
    languages: [python]
    metadata:
      category: best-practice
      
  - id: eval-usage
    pattern: eval($VAR)
    message: |
      eval() executes arbitrary code and should never be used with user input.
      Find an alternative approach.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
  
  # ============================================================================
  # MCP-SPECIFIC: Tool Handler Security
  # ============================================================================
  
  - id: mcp-tool-missing-validation
    pattern: |
      @server.call_tool()
      async def $FUNC(arguments: dict) -> ...:
        ...
    message: |
      MCP tool handler should validate inputs. Use Pydantic models to validate
      the arguments dict before processing.
    severity: WARNING
    languages: [python]
    metadata:
      category: mcp-security
      
  - id: mcp-tool-returns-exception
    pattern: |
      @server.call_tool()
      async def $FUNC(...) -> ...:
        ...
        except $EXC as $VAR:
          return ... $VAR ...
    message: |
      MCP tool should not return raw exceptions to the client. Return structured
      error responses instead.
    severity: WARNING
    languages: [python]
    metadata:
      category: mcp-security
  
  # ============================================================================
  # MCP-SPECIFIC: Environment Variables
  # ============================================================================
  
  - id: mcp-missing-env-var-check
    pattern: os.getenv($VAR)
    message: |
      Environment variable access without validation. Check if the variable
      exists and provide a clear error message if missing.
      Use: api_key = os.getenv("API_KEY") or raise ValueError("API_KEY not set")
    severity: INFO
    languages: [python]
    metadata:
      category: mcp-security


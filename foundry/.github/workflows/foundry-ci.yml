name: MCP Server Foundry CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'specs/**'
  pull_request:
    branches: [ main ]

jobs:
  forge-server:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run Foundry Code Generation (CI Mode)
      run: |
        python forge_recipe.py -i specs/stripe_demo.yaml -o output/stripe --auto-approve
        
    - name: Install Generated Server Dependencies
      run: |
        pip install pydantic httpx
        
    - name: Run Adversarial Security Tests
      run: |
        cd output/stripe/server
        python -m pytest test_server.py -v

    - name: Upload Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: generated-mcp-server
        path: output/stripe/server/

openapi: 3.0.3
info:
  title: World Heritage Sites API
  description: API for accessing UNESCO World Heritage Sites data (based on whc001.xlsx).
  version: "1.0.0"
servers:
  - url: http://localhost:8080/v1
    description: Local server

paths:
  /sites:
    get:
      summary: List heritage sites
      description: Retrieve a list of world heritage sites, optionally filtered by region or category.
      operationId: listSites
      tags:
        - Sites
      parameters:
        - in: query
          name: region
          schema:
            type: string
          description: Filter by region (e.g., Europe and North America)
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category (e.g., Cultural, Natural)
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
          description: Maximum number of records to return
      responses:
        '200':
          description: A list of heritage sites.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HeritageSite'

  /sites/{id}:
    get:
      summary: Get site details
      description: Retrieve detailed information for a specific world heritage site.
      operationId: getSiteById
      tags:
        - Sites
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The unique identifier of the site
      responses:
        '200':
          description: Heritage site details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeritageSite'
        '404':
          description: Site not found

  /sites/search:
    post:
      summary: Search sites by criteria
      description: Search for sites using multiple criteria in the request body.
      operationId: searchSites
      tags:
        - Sites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                keyword:
                  type: string
                inDanger:
                  type: boolean
                minAreaHectares:
                  type: number
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HeritageSite'

components:
  schemas:
    HeritageSite:
      type: object
      properties:
        id:
          type: string
          description: "Unique identifier (ID column)"
        name_en:
          type: string
          description: "Name EN"
        states_names:
          type: string
          description: "States Names"
        short_description_en:
          type: string
          description: "Short Description EN"
        date_inscribed:
          type: integer
          description: "Date inscribed"
        category:
          type: string
          description: "Category (e.g., Cultural, Natural)"
        region:
          type: string
          description: "Region"
        danger:
          type: boolean
          description: "Danger status"
        area_hectares:
          type: number
          description: "Area hectares"
        coordinates:
          type: string
          description: "Coordinates"
      required:
        - id
        - name_en
